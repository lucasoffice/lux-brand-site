<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analytics | CELINE Aventura</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#f7f5f2;color:#1a1a1a;-webkit-font-smoothing:antialiased}
header{background:#1a1a1a;color:#fff;padding:18px 40px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:14px;letter-spacing:6px;text-transform:uppercase;font-weight:400}
header small{display:block;font-size:11px;letter-spacing:2px;color:#999;margin-top:2px}
#statusBar{display:flex;align-items:center;gap:12px}
#statusDot{width:7px;height:7px;border-radius:50%;background:#5a5}
#statusText{font-size:11px;letter-spacing:1px;color:#999}
.btn{font-size:11px;letter-spacing:3px;text-transform:uppercase;border:1px solid #fff;background:none;color:#fff;padding:6px 16px;cursor:pointer;font-family:inherit}
.btn:hover{background:#fff;color:#1a1a1a}
#loading{display:flex;justify-content:center;align-items:center;min-height:60vh;font-size:13px;letter-spacing:2px;color:#999}
#content{display:none;padding:30px 40px 60px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
.card{background:#fff;border:1px solid #e8e4df;padding:28px 20px;text-align:center}
.card .val{font-size:32px;font-weight:300;letter-spacing:1px;color:#1a1a1a}
.card .lbl{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#999;margin-top:6px}
.panel{background:#fff;border:1px solid #e8e4df;padding:28px;margin-bottom:30px}
.panel h2{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#999;margin-bottom:20px;font-weight:400}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.bar-row .bar-label{min-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .bar-track{flex:1;height:3px;background:#eee;position:relative}
.bar-row .bar-fill{height:100%;background:#1a1a1a;position:absolute;left:0;top:0}
.bar-row .bar-count{min-width:30px;text-align:right;color:#999;font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#999;font-weight:400;padding:8px 12px;border-bottom:1px solid #e8e4df}
td{padding:10px 12px;border-bottom:1px solid #f0ece7}
td:first-child span{background:#f7f5f2;padding:3px 8px;font-size:12px;border-radius:2px}

/* Chart */
.chart-area{position:relative;display:flex;align-items:flex-end;gap:0;padding-left:36px;padding-bottom:28px}
.chart-grid{position:absolute;left:36px;right:0;bottom:28px;top:0}
.chart-grid-line{position:absolute;left:0;right:0;border-top:1px solid #f0ece7}
.chart-grid-line span{position:absolute;right:calc(100% + 8px);top:-6px;font-size:10px;color:#bbb}
.chart-col{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.chart-bar-wrap{width:100%;display:flex;align-items:flex-end;justify-content:center}
.chart-bar{background:#1a1a1a;border-radius:2px 2px 0 0;min-height:2px;position:relative;transition:background 0.15s}
.chart-bar:hover{background:#444}
.chart-bar .chart-tip{display:none;position:absolute;top:-26px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:11px;padding:3px 10px;border-radius:2px;white-space:nowrap}
.chart-bar:hover .chart-tip{display:block}
.chart-date{font-size:10px;color:#999;margin-top:8px;white-space:nowrap}

/* US Map */
.map-container{position:relative;width:100%;max-width:760px;margin:0 auto}
.map-container img.map-bg{width:100%;height:auto;display:block;opacity:0.85}
.map-pin{position:absolute;transform:translate(-50%,-50%);z-index:2}
.map-pin-dot{width:12px;height:12px;border-radius:50%;background:#b03030;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.map-pin-pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:rgba(176,48,48,0.2);animation:pulse 2s infinite}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(0.8);opacity:1}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
.map-pin-label{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:11px;padding:4px 10px;border-radius:2px;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none}
.map-pin:hover .map-pin-label{opacity:1}
.map-note{text-align:center;margin-top:12px;font-size:11px;color:#bbb;letter-spacing:1px}

@media(max-width:800px){
.cards{grid-template-columns:repeat(2,1fr)}
.row2{grid-template-columns:1fr}
#content{padding:20px}
}
</style>
</head>
<body>
<header>
<div><h1>Celine &mdash; Aventura</h1><small>Page Analytics</small></div>
<div id="statusBar"><div id="statusDot"></div><span id="statusText">Loading&hellip;</span><button class="btn" onclick="loadData()">Refresh</button></div>
</header>
<div id="loading">Loading analytics&hellip;</div>
<div id="content"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbxlnVFuRC1RpcpZoSipE2Xg1_HppezbkOUdb_02Nb4QSILnFPG9Q_PvJ_M4dBfThnm_/exec';

/* Approximate city coords on 960x600 US map */
var CITY_XY={
'Fort Myers,Florida':[696,512],'Miami,Florida':[738,530],'Orlando,Florida':[718,478],
'Tampa,Florida':[688,488],'Jacksonville,Florida':[700,445],'Aventura,Florida':[735,525],
'New York,New York':[808,218],'Los Angeles,California':[112,368],
'Chicago,Illinois':[568,258],'Houston,Texas':[452,478],'Dallas,Texas':[432,428],
'San Francisco,California':[88,308],'Seattle,Washington':[148,138],
'Boston,Massachusetts':[838,195],'Atlanta,Georgia':[668,415],
'Denver,Colorado':[328,308],'Phoenix,Arizona':[242,405],'Portland,Oregon':[138,185],
'Austin,Texas':[428,465],'Nashville,Tennessee':[618,370],
'Charlotte,North Carolina':[718,368],'San Diego,California':[148,408],
'Philadelphia,Pennsylvania':[798,248],'Washington,District of Columbia':[778,288],
'Minneapolis,Minnesota':[492,195],'Detroit,Michigan':[618,235],
'Las Vegas,Nevada':[192,348],'Salt Lake City,Utah':[258,298],
'Raleigh,North Carolina':[738,348],'Pittsburgh,Pennsylvania':[728,255],
'Columbus,Ohio':[658,285],'Indianapolis,Indiana':[612,295],
'Kansas City,Missouri':[488,328],'St. Louis,Missouri':[548,328],
'New Orleans,Louisiana':[548,478],'Milwaukee,Wisconsin':[548,218],
'Cape Coral,Florida':[702,510],'Naples,Florida':[710,518]
};

/* State center coords for fallback */
var STATE_XY={
'Alabama':[638,432],'Alaska':[160,535],'Arizona':[242,398],'Arkansas':[538,405],
'California':[118,345],'Colorado':[325,318],'Connecticut':[828,215],'Delaware':[800,272],
'Florida':[708,495],'Georgia':[672,425],'Hawaii':[275,535],'Idaho':[218,218],
'Illinois':[568,298],'Indiana':[612,292],'Iowa':[518,262],'Kansas':[438,335],
'Kentucky':[642,338],'Louisiana':[538,468],'Maine':[858,128],'Maryland':[788,282],
'Massachusetts':[842,198],'Michigan':[598,222],'Minnesota':[488,192],'Mississippi':[578,442],
'Missouri':[528,345],'Montana':[288,168],'Nebraska':[418,278],'Nevada':[178,305],
'New Hampshire':[838,168],'New Jersey':[808,258],'New Mexico':[298,402],'New York':[798,192],
'North Carolina':[728,358],'North Dakota':[408,168],'Ohio':[652,278],'Oklahoma':[438,382],
'Oregon':[142,192],'Pennsylvania':[768,242],'Rhode Island':[848,208],'South Carolina':[708,398],
'South Dakota':[408,218],'Tennessee':[628,372],'Texas':[398,455],'Utah':[248,312],
'Vermont':[828,158],'Virginia':[738,312],'Washington':[148,142],'West Virginia':[698,302],
'Wisconsin':[538,202],'Wyoming':[308,238],'District of Columbia':[782,288]
};

var _jsonpCounter=0;
function loadData(){
  document.getElementById('statusText').textContent='Fetching\u2026';
  var cbName='_cb'+(_jsonpCounter++);
  window[cbName]=function(rows){
    try{
      render(rows);
      document.getElementById('loading').style.display='none';
      document.getElementById('content').style.display='block';
      document.getElementById('statusText').textContent='Updated '+new Date().toLocaleTimeString();
    }catch(e){
      document.getElementById('loading').innerHTML='<div style="color:#c00">Error: '+esc(e.message)+'</div>';
      document.getElementById('statusText').textContent='Error';
      console.error(e);
    }
    delete window[cbName];
    var s=document.getElementById('jp-'+cbName);
    if(s)s.parentNode.removeChild(s);
  };
  var script=document.createElement('script');
  script.id='jp-'+cbName;
  script.src=API+'?callback='+cbName;
  script.onerror=function(){
    document.getElementById('loading').innerHTML='<div style="color:#c00">Unable to load data.</div>';
    document.getElementById('statusText').textContent='Error';
    delete window[cbName];
  };
  document.body.appendChild(script);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function countField(rows,field){
  var map={};
  for(var i=0;i<rows.length;i++){var v=rows[i][field]||'(unknown)';map[v]=(map[v]||0)+1;}
  var arr=[];for(var k in map)arr.push({name:k,count:map[k]});
  arr.sort(function(a,b){return b.count-a.count});
  return arr;
}

function renderList(items,max){
  if(!max)max=items.length;
  var top=items[0]?items[0].count:1;
  var h='';
  for(var i=0;i<Math.min(items.length,max);i++){
    var pct=Math.round((items[i].count/top)*100);
    h+='<div class="bar-row"><span class="bar-label">'+esc(items[i].name)+'</span><span class="bar-track"><span class="bar-fill" style="width:'+pct+'%"></span></span><span class="bar-count">'+items[i].count+'</span></div>';
  }
  return h;
}

function renderTimeline(rows){
  var days={};
  for(var i=0;i<rows.length;i++){
    var ts=rows[i].Timestamp||'';
    var d=ts.substring(0,10);
    if(d)days[d]=(days[d]||0)+1;
  }
  var keys=Object.keys(days).sort();
  if(!keys.length)return '<div style="color:#999;text-align:center;padding:40px">No data yet</div>';

  var maxVal=0;
  for(var i=0;i<keys.length;i++){if(days[keys[i]]>maxVal)maxVal=days[keys[i]];}

  /* Nice ceiling for y-axis */
  var gridMax;
  if(maxVal<=5)gridMax=5;
  else if(maxVal<=10)gridMax=10;
  else if(maxVal<=20)gridMax=20;
  else gridMax=Math.ceil(maxVal/10)*10;

  var gridStep;
  if(gridMax<=5)gridStep=1;
  else if(gridMax<=10)gridStep=2;
  else gridStep=Math.ceil(gridMax/5);

  var chartH=180;
  var barW=Math.min(36, Math.max(12, Math.floor(600/keys.length)));
  var colW=Math.max(barW+16, 56);

  var h='<div class="chart-area" style="height:'+(chartH+40)+'px">';
  h+='<div class="chart-grid" style="height:'+chartH+'px">';
  for(var g=0;g<=gridMax;g+=gridStep){
    var bottom=(g/gridMax)*100;
    h+='<div class="chart-grid-line" style="bottom:'+bottom+'%"><span>'+g+'</span></div>';
  }
  h+='</div>';

  for(var i=0;i<keys.length;i++){
    var val=days[keys[i]];
    var hPct=Math.max((val/gridMax)*100,2);
    var parts=keys[i].split('-');
    var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var label=mos[parseInt(parts[1],10)-1]+' '+parseInt(parts[2],10);
    h+='<div class="chart-col" style="width:'+colW+'px">';
    h+='<div class="chart-bar-wrap" style="height:'+chartH+'px"><div class="chart-bar" style="height:'+hPct+'%;width:'+barW+'px"><span class="chart-tip">'+val+' view'+(val!==1?'s':'')+'</span></div></div>';
    h+='<div class="chart-date">'+label+'</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderMap(rows){
  /* Collect US visits by city+state */
  var locs={};
  for(var i=0;i<rows.length;i++){
    var city=rows[i].City||'';
    var region=rows[i].Region||'';
    var country=rows[i].Country||'';
    if(country!=='United States'&&country!=='US')continue;
    var key=city+','+region;
    if(!locs[key])locs[key]={city:city,region:region,count:0};
    locs[key].count+=1;
  }

  var h='<div class="map-container">';
  h+='<img class="map-bg" src="map.png" alt="United States">';

  /* Place pins for each city */
  var locArr=[];
  for(var k in locs)locArr.push(locs[k]);
  locArr.sort(function(a,b){return b.count-a.count});

  for(var i=0;i<locArr.length;i++){
    var loc=locArr[i];
    var ck=loc.city+','+loc.region;
    var coords=CITY_XY[ck]||STATE_XY[loc.region];
    if(!coords)continue;
    /* Map 960x600 coords to percentage positions on map image */
    var xPct=((coords[0]-60)/840)*100;
    var yPct=((coords[1]-60)/500)*100;
    var dotSize=Math.min(10+loc.count*2,22);
    h+='<div class="map-pin" style="left:'+xPct+'%;top:'+yPct+'%">';
    h+='<div class="map-pin-pulse"></div>';
    h+='<div class="map-pin-dot" style="width:'+dotSize+'px;height:'+dotSize+'px"></div>';
    h+='<div class="map-pin-label">'+esc(loc.city)+(loc.region?', '+esc(loc.region):'')+' &mdash; '+loc.count+'</div>';
    h+='</div>';
  }

  h+='<div class="map-note">United States visits</div>';
  h+='</div>';
  return h;
}

function render(rows){
  var total=rows.length;
  var daySet={};
  for(var i=0;i<rows.length;i++){var ts=rows[i].Timestamp||'';daySet[ts.substring(0,10)]=1;}
  var activeDays=Object.keys(daySet).length;

  var devices=countField(rows,'Device');
  var cities=countField(rows,'City');
  var screens=countField(rows,'Screen');

  for(var i=0;i<rows.length;i++){rows[i]._ref=rows[i].Referrer||'Direct';}
  var referrers=countField(rows,'_ref');

  for(var i=0;i<rows.length;i++){
    var p=[];
    if(rows[i].City)p.push(rows[i].City);
    if(rows[i].Region)p.push(rows[i].Region);
    if(rows[i].Country)p.push(rows[i].Country);
    rows[i]._loc=p.join(', ')||'(unknown)';
  }
  var locations=countField(rows,'_loc');

  var topDevice=devices[0]?devices[0].name:'\u2014';
  var topCity=cities[0]?cities[0].name:'\u2014';

  var html='';
  html+='<div class="cards">';
  html+='<div class="card"><div class="val">'+total+'</div><div class="lbl">Total Views</div></div>';
  html+='<div class="card"><div class="val">'+activeDays+'</div><div class="lbl">Active Days</div></div>';
  html+='<div class="card"><div class="val">'+esc(topDevice)+'</div><div class="lbl">Top Device</div></div>';
  html+='<div class="card"><div class="val">'+esc(topCity)+'</div><div class="lbl">Top City</div></div>';
  html+='</div>';

  html+='<div class="panel"><h2>Views Over Time</h2>'+renderTimeline(rows)+'</div>';
  html+='<div class="panel"><h2>Visitor Locations</h2>'+renderMap(rows)+'</div>';

  html+='<div class="row2">';
  html+='<div class="panel"><h2>Devices</h2>'+renderList(devices,8)+'</div>';
  html+='<div class="panel"><h2>Locations</h2>'+renderList(locations,8)+'</div>';
  html+='</div>';
  html+='<div class="row2">';
  html+='<div class="panel"><h2>Screen Sizes</h2>'+renderList(screens,8)+'</div>';
  html+='<div class="panel"><h2>Referrers</h2>'+renderList(referrers,8)+'</div>';
  html+='</div>';

  html+='<div class="panel"><h2>Recent Visits</h2><table><tr><th>Time</th><th>Device</th><th>Screen</th><th>Location</th><th>Referrer</th></tr>';
  var sorted=rows.slice().sort(function(a,b){return(b.Timestamp||'').localeCompare(a.Timestamp||'')});
  for(var i=0;i<Math.min(sorted.length,20);i++){
    var r=sorted[i];
    var dt=new Date(r.Timestamp||'');
    var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var tStr=mos[dt.getMonth()]+' '+dt.getDate()+' '+dt.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    var loc=[];if(r.City)loc.push(r.City);if(r.Region)loc.push(r.Region);
    html+='<tr><td><span>'+esc(tStr)+'</span></td><td>'+esc(r.Device||'-')+'</td><td>'+esc(r.Screen||'-')+'</td><td>'+esc(loc.join(', ')||'-')+'</td><td>'+esc(r.Referrer||'Direct')+'</td></tr>';
  }
  html+='</table></div>';

  document.getElementById('content').innerHTML=html;
}

loadData();
setInterval(loadData,60000);
</script>
</body>
</html>
