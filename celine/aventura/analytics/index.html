<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics | CELINE Aventura</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#faf9f7;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a1a;color:#fff;padding:32px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.header h1{font-size:14px;letter-spacing:6px;text-transform:uppercase;font-weight:400}
.header .sub{font-size:11px;letter-spacing:3px;opacity:.6;margin-top:4px}
.refresh-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 20px;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .3s}
.refresh-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.6)}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:32px}
.stat-card{background:#fff;border:1px solid #e8e6e3;padding:28px 24px;text-align:center}
.stat-card .number{font-size:36px;font-weight:300;letter-spacing:2px;margin-bottom:6px}
.stat-card .label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#888}
.section{background:#fff;border:1px solid #e8e6e3;margin-bottom:24px;padding:28px}
.section-title{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#888;margin-bottom:20px;font-weight:400}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:200px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{background:#1a1a1a;width:100%;min-height:2px;transition:height .6s ease;border-radius:1px 1px 0 0}
.bar-label{font-size:9px;color:#999;margin-top:6px;letter-spacing:1px}
.bar-value{font-size:9px;color:#666;margin-bottom:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:768px){.two-col{grid-template-columns:1fr}.header{padding:24px 20px}}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0eeeb}
.list-item:last-child{border-bottom:none}
.list-item .name{font-size:13px;color:#333;min-width:80px}
.list-item .count{font-size:13px;color:#888;font-weight:300;min-width:30px;text-align:right}
.list-item .bar-bg{flex:1;margin:0 16px;height:4px;background:#f0eeeb;border-radius:2px;overflow:hidden}
.list-item .bar-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width .6s ease}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:400;padding:12px 8px;border-bottom:2px solid #e8e6e3}
td{padding:10px 8px;border-bottom:1px solid #f0eeeb;color:#555}
tr:hover td{background:#faf9f7}
.loading{text-align:center;padding:80px 20px;color:#999;font-size:12px;letter-spacing:3px;text-transform:uppercase}
.empty-state{text-align:center;padding:60px 20px;color:#bbb;font-size:12px;letter-spacing:2px}
.time-badge{display:inline-block;background:#f0eeeb;padding:2px 8px;border-radius:2px;font-size:10px;color:#888}
.live-dot{width:8px;height:8px;background:#4caf50;border-radius:50%;display:inline-block;margin-right:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-bar{display:flex;align-items:center;font-size:11px;color:#888;letter-spacing:1px}
</style>
</head>
<body>
<div class="header"><div><h1>CELINE &mdash; Aventura</h1><div class="sub">Page Analytics</div></div><div style="display:flex;align-items:center;gap:20px"><div class="status-bar"><span class="live-dot"></span><span id="statusText">Loading...</span></div><button class="refresh-btn" onclick="loadData()">Refresh</button></div></div>
<div class="container">
<div id="loading" class="loading">Loading analytics data...</div>
<div id="content" style="display:none">
<div class="stats-row">
<div class="stat-card"><div class="number" id="totalViews">0</div><div class="label">Total Views</div></div>
<div class="stat-card"><div class="number" id="uniqueDays">0</div><div class="label">Active Days</div></div>
<div class="stat-card"><div class="number" id="topDevice">&mdash;</div><div class="label">Top Device</div></div>
<div class="stat-card"><div class="number" id="topCity">&mdash;</div><div class="label">Top City</div></div>
</div>
<div class="section"><div class="section-title">Views Over Time</div><div class="bar-chart" id="timelineChart"></div></div>
<div class="two-col">
<div class="section"><div class="section-title">Devices</div><div id="deviceList"></div></div>
<div class="section"><div class="section-title">Locations</div><div id="locationList"></div></div>
</div>
<div class="two-col">
<div class="section"><div class="section-title">Screen Sizes</div><div id="screenList"></div></div>
<div class="section"><div class="section-title">Referrers</div><div id="referrerList"></div></div>
</div>
<div class="section"><div class="section-title">Recent Visits</div><div style="overflow-x:auto"><table><thead><tr><th>Time</th><th>Device</th><th>Screen</th><th>Location</th><th>Referrer</th></tr></thead><tbody id="visitTable"></tbody></table></div></div>
</div></div>
<script>
const API='https://script.google.com/macros/s/AKfycbxlnVFuRC1RpcpZoSipE2Xg1_HppezbkOUdb_02Nb4QSILnFPG9Q_PvJ_M4dBfThnm_/exec';
async function loadData(){document.getElementById('statusText').textContent='Fetching...';try{const r=await fetch(API);const rows=await r.json();render(rows);document.getElementById('loading').style.display='none';document.getElementById('content').style.display='block';document.getElementById('statusText').textContent='Updated '+new Date().toLocaleTimeString()}catch(e){document.getElementById('loading').innerHTML='<div style="color:#c00">Unable to load data.</div>';document.getElementById('statusText').textContent='Error'}}
function render(rows){document.getElementById('totalViews').textContent=rows.length;const days=new Set(rows.map(r=>new Date(r.Timestamp).toISOString().split('T')[0]));document.getElementById('uniqueDays').textContent=days.size;const devCounts=cf(rows,'Device');const topDev=Object.entries(devCounts).sort((a,b)=>b[1]-a[1])[0];document.getElementById('topDevice').textContent=topDev?topDev[0]:'—';const cityCounts=cf(rows,'City');const topCity=Object.entries(cityCounts).sort((a,b)=>b[1]-a[1])[0];document.getElementById('topCity').textContent=topCity?topCity[0]:'—';rTL(rows);rL('deviceList',devCounts);const locCounts={};rows.forEach(r=>{const loc=[r.City,r.Region,r.Country].filter(Boolean).join(', ')||'Unknown';locCounts[loc]=(locCounts[loc]||0)+1});rL('locationList',locCounts);rL('screenList',cf(rows,'Screen'));const refCounts={};rows.forEach(r=>{let ref=r.Referrer||'Direct';if(ref.length>40)ref=ref.substring(0,40)+'...';refCounts[ref]=(refCounts[ref]||0)+1});rL('referrerList',refCounts);const tbody=document.getElementById('visitTable');tbody.innerHTML='';const recent=rows.slice().reverse().slice(0,50);if(!recent.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">No visits recorded yet</td></tr>';return}recent.forEach(r=>{const tr=document.createElement('tr');const t=new Date(r.Timestamp);const ts=t.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});const loc=[r.City,r.Region].filter(Boolean).join(', ')||'—';let ref=r.Referrer||'Direct';if(ref.length>30)ref=ref.substring(0,30)+'...';tr.innerHTML='<td><span class="time-badge">'+ts+'</span></td><td>'+esc(r.Device||'—')+'</td><td>'+esc(r.Screen||'—')+'</td><td>'+esc(loc)+'</td><td>'+esc(ref)+'</td>';tbody.appendChild(tr)})}
function cf(rows,f){const c={};rows.forEach(r=>{const v=r[f]||'Unknown';c[v]=(c[v]||0)+1});return c}
function rL(id,counts){const el=document.getElementById(id);const s=Object.entries(counts).sort((a,b)=>b[1]-a[1]);const mx=s[0]?s[0][1]:1;if(!s.length){el.innerHTML='<div class="empty-state">No data yet</div>';return}el.innerHTML=s.slice(0,8).map(([n,c])=>'<div class="list-item"><span class="name">'+esc(n)+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+(c/mx*100).toFixed(1)+'%"></div></div><span class="count">'+c+'</span></div>').join('')}
function rTL(rows){const ch=document.getElementById('timelineChart');const bd={};rows.forEach(r=>{const d=new Date(r.Timestamp).toISOString().split('T')[0];bd[d]=(bd[d]||0)+1});const en=Object.entries(bd).sort((a,b)=>a[0].localeCompare(b[0]));if(!en.length){ch.innerHTML='<div class="empty-state" style="width:100%;display:flex;align-items:center;justify-content:center">No data yet</div>';return}const ad=[];const st=new Date(en[0][0]);const ed=new Date(en[en.length-1][0]);for(let d=new Date(st);d<=ed;d.setDate(d.getDate()+1)){const k=d.toISOString().split('T')[0];ad.push([k,bd[k]||0])}const dp=ad.length>30?ad.slice(-30):ad;const mx=Math.max(...dp.map(d=>d[1]),1);ch.innerHTML=dp.map(([day,c])=>{const ht=Math.max((c/mx)*180,2);const lb=new Date(day+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});return '<div class="bar-col"><div class="bar-value">'+(c||'')+'</div><div class="bar" style="height:'+ht+'px"></div><div class="bar-label">'+(dp.length<=15?lb:'')+'</div></div>'}).join('')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadData();setInterval(loadData,60000);
</script>
</body>
</html>
